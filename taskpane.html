<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PowerPoint Add-in</title>

  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      line-height: 1.4;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    p {
      margin-bottom: 12px;
      color: #444;
    }

    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Add a new slide</h1>
  <p>Click the button to add a blank slide to the current presentation.</p>
  <button id="add-slide">Add slide</button>
  <div id="status"></div>

  <script>
    Office.onReady(() => {
      document.getElementById("add-slide").addEventListener("click", addSlide);
    });

    async function addSlide() {
      const status = document.getElementById("status");
      status.textContent = "Adding slide...";

      try {
        await PowerPoint.run(async (context) => {
          const slide = context.presentation.slides.add();
          slide.load("id");
          await context.sync();
          status.textContent = `Slide added. ID: ${slide.id}`;
        });
      } catch (error) {
        console.error(error);
        status.textContent = `Error: ${error.message || error}`;
      }
    }
  </script>
</body>
</html>
